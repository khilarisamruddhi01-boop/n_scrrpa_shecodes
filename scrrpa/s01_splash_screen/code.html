<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>N-SCRRA | National Supply Chain Analyzer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2E9CCA",
                        "navy-dark": "#1E3A5F",
                        "deep-blue": "#0D1B2A",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0D1B2A",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .splash-gradient {
            background: linear-gradient(to bottom, #1E3A5F, #0D1B2A);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex min-h-screen w-full flex-col splash-gradient overflow-hidden">
<div class="flex flex-1 flex-col items-center justify-center px-6">
<!-- Center: Large professional SVG logo (waveform/network style) -->
<div class="mb-8 flex items-center justify-center">
<div class="relative h-32 w-32 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-2 border-primary/20 scale-125"></div>
<div class="absolute inset-0 rounded-full border border-primary/40 scale-150"></div>
<span class="material-symbols-outlined text-primary !text-[80px]" style="font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;">
                        hub
                    </span>
<div class="absolute -bottom-2 -right-2">
<span class="material-symbols-outlined text-primary !text-[32px]">
                            security
                        </span>
</div>
</div>
</div>
<!-- Title & Subtitle -->
<div class="text-center">
<h1 class="text-white text-[36px] font-bold tracking-tight leading-none mb-2 uppercase">
                    N-SCRRA
                </h1>
<p class="text-white/80 text-[14px] font-medium tracking-wide uppercase">
                    National Supply Chain Analyzer
                </p>
</div>
</div>
<!-- Footer Elements -->
<div class="w-full px-8 pb-12 flex flex-col items-center">
<!-- Circular Progress Indicator -->
<div class="relative h-12 w-12 mb-8">
<svg class="h-full w-full" viewbox="0 0 36 36">
<circle class="text-primary/20" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-primary" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-dasharray="70, 100" stroke-linecap="round" stroke-width="3"></circle>
</svg>
</div>
<div class="w-full flex justify-between items-end">
<div class="flex flex-col gap-1">
<span class="text-primary/60 text-[10px] font-semibold uppercase tracking-[0.2em]">Secure Environment</span>
<div class="h-0.5 w-16 bg-primary/40 rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
</div>
<!-- Bottom-right: v1.0.0 -->
<div class="text-white/40 text-[10px] font-medium">
                    v1.0.0
                </div>
</div>
</div>
<!-- Decorative UI elements for "High-end secure feel" -->
<div class="absolute top-0 left-0 w-full p-4 flex justify-between opacity-20 pointer-events-none">
<span class="text-[8px] text-white font-mono tracking-tighter">SYS_AUTH_READY: 0x4421</span>
<span class="text-[8px] text-white font-mono tracking-tighter">LATENCY: 14ms</span>
</div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(46,156,202,0.1),transparent_70%)] pointer-events-none"></div>
</div>
