<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .map-container {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .route-dash {
            stroke-dasharray: 8, 8;
        }
        .heatmap-gradient {
            background: radial-gradient(circle, rgba(236,91,19,0.15) 0%, rgba(236,91,19,0.05) 50%, transparent 100%);
        }
        .glass-panel {
            backdrop-filter: blur(8px);
            background-color: rgba(248, 246, 246, 0.9);
        }
        .dark .glass-panel {
            background-color: rgba(34, 22, 16, 0.9);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="map-container flex flex-col">
<!-- Background Map Layer (SVG Simulation) -->
<div class="absolute inset-0 z-0">
<img alt="Detailed topographic city map" class="w-full h-full object-cover opacity-40 dark:opacity-20 grayscale" data-alt="Detailed topographic city map background" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKglnSmQS44gUmql9bduhVdFRGkJEIzWIbuiATHW7U7_Au5AGreTw7oYwV9xuSyzUOOIfkd7o0bvCkeXIyaw5l2IyQv3wWeWwFM-i0ACkGITf_AK8y8FNpa_emDqvEVT5LtNx5UgbND61iRT2cLlKrUMVGuq4glPxDmDha0MNSa-EbBTZiB2mMDoscNeTUvbV8qI8Py4xejXm2Uk_NHv8Tqdyj3KXeSwP6GDjyab5R7LBgi4lzkvl3tJL0m4OUtdVlfJsGOnAxiAzA"/>
<!-- Risk Heatmap Overlays -->
<div class="absolute top-1/4 left-1/3 w-64 h-64 rounded-full heatmap-gradient"></div>
<div class="absolute bottom-1/3 right-1/4 w-96 h-96 rounded-full heatmap-gradient"></div>
<div class="absolute top-1/2 right-1/2 w-48 h-48 rounded-full bg-primary/10 blur-3xl"></div>
<!-- Route Overlay SVG -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none">
<!-- Original Route (Dashed) -->
<path class="route-dash" d="M 200,600 Q 400,550 500,400 T 800,200" fill="none" stroke="#94a3b8" stroke-width="3"></path>
<!-- Optimized Route (Solid Accent) -->
<path d="M 200,600 Q 300,500 450,480 T 800,200" fill="none" stroke="#ec5b13" stroke-linecap="round" stroke-width="5"></path>
<!-- Waypoints -->
<circle cx="200" cy="600" fill="#ec5b13" r="8"></circle>
<circle cx="800" cy="200" fill="#ec5b13" r="8"></circle>
</svg>
</div>
<!-- Top Picker Controls -->
<div class="relative z-10 p-4 max-w-xl mx-auto w-full">
<div class="glass-panel p-4 rounded-xl shadow-lg border border-primary/10 space-y-3">
<div class="flex items-center gap-3">
<div class="flex flex-col items-center gap-1">
<span class="material-icons text-primary text-sm">radio_button_checked</span>
<div class="w-0.5 h-6 bg-slate-300 dark:bg-slate-700"></div>
<span class="material-icons text-primary text-sm">location_on</span>
</div>
<div class="flex-1 space-y-2">
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg text-sm px-3 py-2 focus:ring-2 focus:ring-primary" type="text" value="Silicon Valley Tech Center"/>
</div>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg text-sm px-3 py-2 focus:ring-2 focus:ring-primary" type="text" value="San Francisco Downtown Terminal"/>
</div>
</div>
<button class="bg-primary p-3 rounded-lg text-white shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
<span class="material-icons">sync</span>
</button>
</div>
</div>
</div>
<!-- Float Map Actions -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-2">
<button class="bg-white dark:bg-background-dark p-3 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 text-primary">
<span class="material-icons">layers</span>
</button>
<button class="bg-white dark:bg-background-dark p-3 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-icons">my_location</span>
</button>
<button class="bg-white dark:bg-background-dark p-3 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-icons">add</span>
</button>
<button class="bg-white dark:bg-background-dark p-3 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-icons">remove</span>
</button>
</div>
<!-- Bottom Comparison Sheet -->
<div class="mt-auto relative z-20">
<div class="bg-white dark:bg-background-dark rounded-t-[2rem] shadow-2xl p-6 border-t border-slate-200 dark:border-slate-800">
<div class="w-12 h-1 bg-slate-200 dark:bg-slate-800 rounded-full mx-auto mb-6"></div>
<div class="flex items-center justify-between mb-6">
<div>
<h2 class="text-xl font-bold">Route Optimized</h2>
<p class="text-slate-500 text-sm">Efficiency increased by 22%</p>
</div>
<span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-semibold">SAFE ROUTE FOUND</span>
</div>
<div class="grid grid-cols-3 gap-4 mb-8">
<!-- Metric Card 1 -->
<div class="p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-background-dark/50">
<p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Distance</p>
<div class="flex items-baseline gap-1">
<span class="text-lg font-bold">14.2</span>
<span class="text-xs text-slate-500">km</span>
</div>
<div class="flex items-center gap-1 mt-1 text-green-500">
<span class="material-icons text-[12px]">arrow_downward</span>
<span class="text-[10px] font-bold">-2.4km</span>
</div>
</div>
<!-- Metric Card 2 -->
<div class="p-4 rounded-xl border border-primary/20 bg-primary/5">
<p class="text-[10px] uppercase tracking-wider text-primary font-bold mb-1">Transit Time</p>
<div class="flex items-baseline gap-1">
<span class="text-lg font-bold text-primary">24</span>
<span class="text-xs text-primary/80">min</span>
</div>
<div class="flex items-center gap-1 mt-1 text-green-500">
<span class="material-icons text-[12px]">arrow_downward</span>
<span class="text-[10px] font-bold">-8 min</span>
</div>
</div>
<!-- Metric Card 3 -->
<div class="p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-background-dark/50">
<p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Risk Score</p>
<div class="flex items-baseline gap-1">
<span class="text-lg font-bold">1.2</span>
<span class="text-xs text-slate-500">/ 5</span>
</div>
<div class="flex items-center gap-1 mt-1 text-green-500">
<span class="material-icons text-[12px]">security</span>
<span class="text-[10px] font-bold">Low Risk</span>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row gap-4">
<button class="flex-1 bg-primary text-white font-bold py-4 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-icons">navigation</span>
                        Start Optimized Trip
                    </button>
<button class="px-6 py-4 rounded-xl border border-slate-200 dark:border-slate-800 font-bold text-slate-600 dark:text-slate-400 flex items-center justify-center gap-2">
<span class="material-icons">share</span>
                        Share
                    </button>
</div>
</div>
</div>
<!-- Legend Overlay -->
<div class="absolute bottom-96 left-4 z-10 glass-panel p-3 rounded-lg border border-slate-200 dark:border-slate-800 text-[10px]">
<div class="space-y-2">
<div class="flex items-center gap-2">
<div class="w-4 h-1 bg-primary rounded-full"></div>
<span class="font-bold">Optimized Route</span>
</div>
<div class="flex items-center gap-2">
<div class="w-4 h-1 border-t-2 border-dashed border-slate-400"></div>
<span class="font-bold">Previous Route</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary/30 blur-[2px]"></div>
<span class="font-bold">Congestion / Risk</span>
</div>
</div>
</div>
</div>
</body></html>
